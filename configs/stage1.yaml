dataset:
  root: data/Teeth3DS+
  points_per_tooth: 1024
  teeth_per_jaw: 16
  include_normals: true
  normal_radius: 0.1
  normal_max_nn: 30
  low_points: 256
  mid_points: 512
  high_points: 1024

stage1:
  batch_size: 8
  epochs: 300
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_workers: 4
  point_dim: 6
  hidden_dim: 128
  global_dim: 512
  voxel_resolution: 64
  k_neighbors: 32
  low_points: 256
  mid_points: 512
  high_points: 1024
  alpha_low: 0.2
  alpha_mid: 0.4
  lambda_cd: 0.5
  lambda_cgoc: 0.3
  lambda_sdf: 0.2
  cgoc_top_ratio: 0.3
  cgoc_temperature: 0.1

runtime:
  seed: 42
  device: cuda
  output_dir: outputs/stage1
  log_interval: 20
  checkpoint_interval: 10
